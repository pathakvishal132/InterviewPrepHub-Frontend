<div class="about-wrapper">
  <!-- Features Grid -->
  <div class="about-inner">
    <div class="about-header">
      <h2 class="section-title">Everything You Need to <span class="gradient-text">Succeed</span></h2>
      <p class="section-subtitle">A complete interview preparation ecosystem built for engineers</p>
    </div>

    <div class="about-cards-grid">
      <div class="about-card" *ngFor="let feature of aboutFeatures; let i = index"
           [style.animation-delay]="(i * 0.1) + 's'">
        <div class="about-card-icon" [style.background]="feature.iconBg">
          <i class="fas" [class]="feature.icon" [style.color]="feature.color"></i>
        </div>
        <h3 class="about-card-title">{{ feature.title }}</h3>
        <p class="about-card-desc">{{ feature.desc }}</p>
        <div class="about-card-tag">{{ feature.tag }}</div>
      </div>
    </div>

    <!-- How It Works -->
    <div class="how-section">
      <div class="about-header">
        <h2 class="section-title">How It <span class="gradient-text">Works</span></h2>
        <p class="section-subtitle">Three simple steps to your dream job</p>
      </div>

      <div class="steps-row">
        <div class="step-card" *ngFor="let step of steps; let i = index; let last = last">
          <div class="step-num">{{ i + 1 }}</div>
          <div class="step-icon" [style.background]="step.iconBg">
            <i class="fas" [class]="step.icon" [style.color]="step.color"></i>
          </div>
          <h3 class="step-title">{{ step.title }}</h3>
          <p class="step-desc">{{ step.desc }}</p>
          <a *ngIf="step.link" [routerLink]="step.link" class="step-link">
            Get Started <i class="fas fa-arrow-right"></i>
          </a>
          <div class="step-connector" *ngIf="!last"></div>
        </div>
      </div>
    </div>

  </div>

  <app-user-review></app-user-review>
</div>
