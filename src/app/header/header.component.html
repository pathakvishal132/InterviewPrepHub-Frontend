<header class="navbar" [class.scrolled]="isScrolled" [class.menu-open]="menuOpen">

  <div class="navbar-inner">
    <!-- Logo -->
    <div class="navbar-logo" routerLink="/">
      <div class="logo-icon">
        <i class="fas fa-brain"></i>
      </div>
      <span class="logo-text">InterviewPrep<span class="logo-accent">Hub</span></span>
    </div>

    <!-- Desktop Nav -->
    <nav class="navbar-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">
        <i class="fas fa-home"></i> Home
      </a>
      <a routerLink="/interview-dashboard" routerLinkActive="active" class="nav-link">
        <i class="fas fa-chart-line"></i> Prep
      </a>
      <a routerLink="/user-steps" routerLinkActive="active" class="nav-link">
        <i class="fas fa-map"></i> Guide
      </a>
      <a routerLink="/about" routerLinkActive="active" class="nav-link">
        <i class="fas fa-info-circle"></i> About
      </a>
      <a *ngIf="receivedMessage.length" routerLink="/admin" routerLinkActive="active" class="nav-link nav-link--admin">
        <i class="fas fa-shield-alt"></i> Admin
      </a>
    </nav>

    <!-- Right Actions -->
    <div class="navbar-actions">
      <!-- Profile -->
      <a *ngIf="isLoggedIn" routerLink="/profile" class="profile-btn" title="My Profile">
        <div class="profile-avatar">
          <i class="fas fa-user"></i>
        </div>
      </a>

      <!-- Auth buttons -->
      <a *ngIf="!isLoggedIn" routerLink="/login" class="btn-nav-login">
        <i class="fas fa-sign-in-alt"></i> Login
      </a>
      <button *ngIf="isLoggedIn" (click)="logout()" class="btn-nav-logout">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>

      <!-- Hamburger -->
      <button class="hamburger" (click)="toggleMenu()" [class.open]="menuOpen" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div class="mobile-menu" [class.open]="menuOpen">
    <a routerLink="/" class="mobile-link" (click)="closeMenu()">
      <i class="fas fa-home"></i> Home
    </a>
    <a routerLink="/interview-dashboard" class="mobile-link" (click)="closeMenu()">
      <i class="fas fa-chart-line"></i> Prep
    </a>
    <a routerLink="/user-steps" class="mobile-link" (click)="closeMenu()">
      <i class="fas fa-map"></i> Guide
    </a>
    <a routerLink="/about" class="mobile-link" (click)="closeMenu()">
      <i class="fas fa-info-circle"></i> About
    </a>
    <a *ngIf="receivedMessage.length" routerLink="/admin" class="mobile-link" (click)="closeMenu()">
      <i class="fas fa-shield-alt"></i> Admin
    </a>
    <div class="mobile-divider"></div>
    <a *ngIf="!isLoggedIn" routerLink="/login" class="mobile-link mobile-link--cta" (click)="closeMenu()">
      <i class="fas fa-sign-in-alt"></i> Login / Sign Up
    </a>
    <button *ngIf="isLoggedIn" (click)="logout(); closeMenu()" class="mobile-link mobile-link--logout">
      <i class="fas fa-sign-out-alt"></i> Logout
    </button>
    <a *ngIf="isLoggedIn" routerLink="/profile" class="mobile-link" (click)="closeMenu()">
      <i class="fas fa-user"></i> My Profile
    </a>
  </div>
</header>
