<div class="subdomain-wrapper">

  <!-- Hero -->
  <div class="page-hero">
    <div class="page-hero-inner">
      <div class="back-btn" (click)="goBack()">
        <i class="fas fa-arrow-left"></i> Back to Domains
      </div>
      <div class="page-hero-badge"><i class="fas fa-laptop-code"></i> Computer Science</div>
      <h1 class="page-hero-title">Select Your <span class="gradient-text">Subdomain</span></h1>
      <p class="page-hero-sub">Choose a specific area to practice curated interview questions with AI-powered feedback.</p>
    </div>
    <div class="hero-orb hero-orb-1"></div>
    <div class="hero-orb hero-orb-2"></div>
  </div>

  <!-- Cards -->
  <div class="subdomain-section">
    <div class="subdomain-grid">
      <div class="subdomain-card glass-card" *ngFor="let card of cards" (click)="navigateToQuestions(card.title, card.subfield)">
        <div class="subdomain-img-wrap">
          <img [src]="card.imgSrc" [alt]="card.title" class="subdomain-img" />
        </div>
        <div class="subdomain-card-body">
          <h3 class="subdomain-title">{{ card.title }}</h3>
          <p class="subdomain-meta"><i class="fas fa-question-circle"></i> 40 curated questions</p>
          <div class="subdomain-chip">
            <i class="fas fa-microphone"></i> Voice + Text Ready
          </div>
        </div>
        <div class="subdomain-arrow">
          <i class="fas fa-arrow-right"></i>
        </div>
      </div>
    </div>
  </div>

</div>
