
<div class="main">
    <div class="container">
         <div class="table-title">
            <h2 >Problems</h2>
        </div>

        <!-- Search Box -->
        <div class="search-box">
            <input type="text" [(ngModel)]="searchText" placeholder="Search Questions...">
        </div>

        <!-- Company Table -->
        <table class="company-table">
            <thead>
                <tr>
                    <th>Question</th>
                    <th>Answer</th>
                    <!-- <th>Solution</th>
                    <th>Difficulty</th> -->
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let question of questions">
                    <td>{{ question.question }}</td>
                    <td>{{ question.answer }}</td>
                    <!-- <td>
                    <a [href]="question.solutionUrl" target="_blank" class="solution-link">
                        View Solution
                    </a>
                    </td>
                    <td>{{ question.difficulty }}</td> -->
                </tr>

            </tbody>
        </table>

        <!-- Pagination -->
        <div>
  <!-- Your data list display here -->
  
         <app-pagination
            [currentPage]="currentPage"
            [totalPages]="totalPages"
            (pageChanged)="onPageChanged($event)">
        </app-pagination>
       
        
    </div>
    <div class="go-back-container">
    <button (click)="goBack()" class="go-back-btn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-arrow-left">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        <span>Go Back</span>
    </button>
    </div>
</div>
