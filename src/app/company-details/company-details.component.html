
<div class="main">
    <div class="container">
         <div class="table-title">
            <h2 >Problems</h2>
        </div>

        <div class="search-box">
            <input 
                type="text" 
                placeholder="Search Questions..."
                [(ngModel)]="searchTerm" 
                (keyup.enter)="onSearch()" 
            />
        </div>

        <!-- Company Table -->
            <div *ngFor="let question of questions" class="question-answer-container">
                <div class="question-box">
                    <h3>Question</h3>
                    <div [innerHTML]="question.question"></div>  <!-- Safely render HTML content from the backend -->
                </div>
                <div class="answer-box">
                    <h3>Answer</h3>
                    <div [innerHTML]="question.answer"></div>  <!-- Safely render HTML content from the backend -->
                </div>
                </div>
  <!-- Your data list display here -->
  
         <app-pagination
            [currentPage]="currentPage"
            [totalPages]="totalPages"
            (pageChanged)="onPageChanged($event)">
        </app-pagination>
       
        
    </div>
    <div class="go-back-container">
    <button (click)="goBack()" class="go-back-btn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-arrow-left">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        <span>Go Back</span>
    </button>
    </div>
</div>
